<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <div class="input-field">
    <mat-form-field class="example-form-field">
      <mat-label>Search user</mat-label>
      <input
        matInput
        type="text"
        [ngModel]="value()"
        (ngModelChange)="updateValue($event)"
        placeholder="Type Leanne or Ervin"
      />

      @if (value().length) {
        <button matSuffix matIconButton aria-label="Clear" (click)="clearValue()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>

  <div class="result-panel">
    <p class="result-panel__label">Interview-friendly switchMap example</p>
    <p>{{ explanation() }}</p>

    @if (isLoading()) {
      <p class="result-panel__status">Calling <code>searchUsers()</code>...</p>
    } @else if (users().length) {
      <div class="user-list">
        @for (user of users(); track user.id) {
          <article class="user-card">
            <h3>{{ user.name }}</h3>
            <p>{{ user.email }}</p>
            <span>{{ user.username }}</span>
          </article>
        }
      </div>
    }
  </div>
</mat-dialog-content>
