sonar.projectKey=ecommerce
sonar.projectName=ecommerce
sonar.sourceEncoding=UTF-8

# Main source roots in this workspace.
sonar.sources=apps,libs,nodejs/src

# Test files live alongside source in this repo.
sonar.tests=apps,libs,nodejs/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js

# Keep generated and vendor content out of analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.angular/**,**/.nx/**,docs/**,public/**
